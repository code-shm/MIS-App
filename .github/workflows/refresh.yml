name: Refresh dashboard data

# Keeps the Vercel-deployed (static) dashboard self-updating: on a schedule it
# re-pulls the CFPB Amex feed, re-scores, regenerates the dashboard extract +
# PDF, and commits them. The push triggers a Vercel redeploy automatically.

on:
  schedule:
    - cron: "0 6 * * *"        # daily at 06:00 UTC
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh + rescore (trains models fresh on the runner)
        run: python -m src.refresh --retrain

      - name: Regenerate executive PDF
        run: |
          python -m src.report
          cp reports/amex_executive_report.pdf dashboards/html/amex_executive_report.pdf

      - name: Rebuild standalone dashboard
        run: python scripts/build_standalone.py

      - name: Commit refreshed artifacts
        run: |
          git config user.name "amex-refresh-bot"
          git config user.email "actions@github.com"
          git add dashboards/html/data.json dashboards/html/data.js \
                  dashboards/html/version.json \
                  dashboards/html/amex_executive_report.pdf \
                  dashboards/html/amex_dashboard_standalone.html
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: automated dashboard data refresh [skip ci]"
            git push
          fi
